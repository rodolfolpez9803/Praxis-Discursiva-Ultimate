let score=0,streak=0,best=0,ok=0,bad=0,time=60,intv;
let preguntasDisponibles=[];
let actual;
let inicioPregunta=0;

function iniciarPreguntas(){
 preguntasDisponibles=[...banco];
}

function randomQuestion(){
 if(preguntasDisponibles.length===0) iniciarPreguntas();

 const idx=Math.floor(Math.random()*preguntasDisponibles.length);
 actual=preguntasDisponibles[idx];
 preguntasDisponibles.splice(idx,1);

 document.getElementById("question").innerHTML=`<div class="badge">${actual.t}</div><br>${actual.q}`;

 let ops=[actual.a,...actual.w].sort(()=>Math.random()-0.5);

 document.getElementById("options").innerHTML=ops.map(op=>
 `<button class='option' onclick='answer(this, ${JSON.stringify(op)}, ${JSON.stringify(actual.a)})'>${op}</button>`
 ).join("");

 inicioPregunta=Date.now();
}

function startGame(){
 iniciarPreguntas();
 document.getElementById("start").classList.add("hidden");
 document.getElementById("game").classList.remove("hidden");
 randomQuestion();

 intv=setInterval(()=>{
  time--;
  document.getElementById("time").textContent=time;
  document.getElementById("barfill").style.width=(time/60*100)+"%";
  if(time<=0) finish();
 },1000);
}

window.startGame = startGame;

function answer(btn,sel,correct){
 const botones=document.querySelectorAll(".option");
 botones.forEach(b=>b.disabled=true);

 if(sel===correct){
   let pts=actual.d?20:10;

   if((Date.now()-inicioPregunta)/1000<2) pts+=5;

   score+=pts;
   ok++;
   streak++;

   if(streak===3) score+=5;
   if(streak===5) score+=10;
   if(streak===8) score+=20;
   if(streak===10) score+=30;
   if(streak===15) score+=50;

   best=Math.max(best,streak);
   btn.classList.add("correct");
 }else{
   bad++;
   streak=0;
   btn.classList.add("wrong");

   botones.forEach(b=>{
      if(b.textContent===correct) b.classList.add("correct");
   });
 }

 document.getElementById("score").textContent=score;
 document.getElementById("streak").textContent=streak;
 document.getElementById("level").textContent=Math.floor(score/100)+1;

 setTimeout(()=>{
   if(time>0) randomQuestion();
 },1000);
}

window.answer = answer;

function finish(){
 clearInterval(intv);

 document.getElementById("game").classList.add("hidden");
 document.getElementById("end").classList.remove("hidden");

 let cert="Participante";
 if(score>=700) cert="🏆 Leyenda de la Praxis";
 else if(score>=500) cert="👑 Gran Maestro";
 else if(score>=400) cert="🥇 Maestro";
 else if(score>=300) cert="🥈 Experto";
 else if(score>=200) cert="🥉 Especialista";
 else if(score>=100) cert="🎖 Comunicador Técnico";

 document.getElementById("stats").innerHTML=`
 Puntos: ${score}<br>
 Aciertos: ${ok}<br>
 Errores: ${bad}<br>
 Mejor racha: ${best}<br>
 Certificado: ${cert}`;

 saveScore();
}


async function saveScore(){
 let name=prompt("Nombre para el ranking:") || "Participante";

 await push(ref(db,"scores"),{
   name:name,
   score:score,
   date:Date.now()
 });

 const snap = await get(ref(db,"participants"));
 const total = snap.exists() ? snap.val() : 0;

 await set(ref(db,"participants"), total + 1);

 loadRanking();
}



async function loadRanking(){
 const snap = await get(ref(db,"scores"));

 let datos=[];
 if(snap.exists()){
   datos = Object.values(snap.val());
 }

 datos.sort((a,b)=>b.score-a.score);
 datos = datos.slice(0,10);

 let body=document.getElementById("ranking");
 body.innerHTML="";

 datos.forEach((p,i)=>{
   let pos=i==0?"🥇":i==1?"🥈":i==2?"🥉":(i+1);
   body.innerHTML+=`<tr><td>${pos}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
 });

 const participantes = await get(ref(db,"participants"));
 document.getElementById("participants").textContent =
   participantes.exists() ? participantes.val() : 0;
}



async function resetRanking(){
 if(confirm("¿Borrar ranking?")){
   await set(ref(db,"scores"), null);
   await set(ref(db,"participants"), 0);
   loadRanking();
 }
}


loadRanking();
</script>
